name: PingClaw
options:
  bundleIdPrefix: me.pingclaw
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"

targets:
  PingClaw:
    type: application
    platform: iOS
    sources:
      - path: ../PingClaw/Sources/PingClaw
        excludes:
          - "Resources/**"
      - path: Sources/BundleShim.swift
      - path: Assets.xcassets
    resources:
      - path: ../PingClaw/Sources/PingClaw/Resources/Fonts
        buildPhase: resources
      - path: ../PingClaw/Sources/PingClaw/Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
      - path: ../PingClaw/Sources/PingClaw/Resources/Hero.png
        buildPhase: resources
      - path: ../PingClaw/Sources/PingClaw/Resources/HeroLight.png
        buildPhase: resources
      - path: ../PingClaw/Sources/PingClaw/Resources/Wordmark.png
        buildPhase: resources
      - path: ../PingClaw/Sources/PingClaw/Resources/WordmarkLight.png
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.pingclaw.app
        INFOPLIST_FILE: ../PingClaw/PingClaw-Info.plist
        CODE_SIGN_ENTITLEMENTS: ../PingClaw/PingClaw.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 74JC6TTWQ8
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "3"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: false
        SWIFT_EMIT_LOC_STRINGS: true
    entitlements:
      path: ../PingClaw/PingClaw.entitlements
